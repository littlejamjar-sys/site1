<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="refresh" content="6;url=/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent | Northwatch</title>
<link rel="stylesheet" href="styles.css?v=9">
<style>
  .thankyou-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    padding: 40px 20px;
  }
  .thankyou-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 2px solid var(--amber);
    padding: 50px 44px;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .thankyou-card h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 16px;
  }
  .thankyou-card p {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 0;
  }
  .thankyou-card .redirect-note {
    margin-top: 28px;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(200, 169, 110, 0.45);
  }
</style>
</head>

<body>

<div class="thankyou-wrap">
  <div class="thankyou-card">
    <h1>Message Sent</h1>
    <span class="accent-line centered"></span>
    <p>
      Thank you for contacting Northwatch Group.<br>
      Your message has been received and we will respond as soon as possible.
    </p>
    <p class="redirect-note">
      Returning to homepage&hellip;
    </p>
  </div>
</div>

</body>
</html>
